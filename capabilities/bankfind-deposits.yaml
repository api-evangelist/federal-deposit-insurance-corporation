naftiko: 1.0.0-alpha2
info:
  label: FDIC BankFind Suite API — Deposits
  description: 'FDIC BankFind Suite API — Deposits. 1 operations. Lead operation: Retrieve Summary of Deposits data. Self-contained
    Naftiko capability covering one Federal Deposit Insurance Corporation business surface.'
  tags:
  - Federal Deposit Insurance Corporation
  - Deposits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FEDERAL_DEPOSIT_INSURANCE_CORPORATION_API_KEY: FEDERAL_DEPOSIT_INSURANCE_CORPORATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: bankfind-deposits
    baseUri: https://banks.data.fdic.gov/api
    description: FDIC BankFind Suite API — Deposits business capability. Self-contained, no shared references.
    resources:
    - name: sod
      path: /sod
      operations:
      - name: listsummaryofdeposits
        method: GET
        description: Retrieve Summary of Deposits data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bankfind-deposits-rest
    port: 8080
    description: REST adapter for FDIC BankFind Suite API — Deposits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sod
      name: sod
      description: REST surface for sod.
      operations:
      - method: GET
        name: listsummaryofdeposits
        description: Retrieve Summary of Deposits data
        call: bankfind-deposits.listsummaryofdeposits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bankfind-deposits-mcp
    port: 9090
    transport: http
    description: MCP adapter for FDIC BankFind Suite API — Deposits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-summary-deposits-data
      description: Retrieve Summary of Deposits data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bankfind-deposits.listsummaryofdeposits
      outputParameters:
      - type: object
        mapping: $.
