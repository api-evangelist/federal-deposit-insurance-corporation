naftiko: 1.0.0-alpha2
info:
  label: FDIC BankFind Suite API — Locations
  description: 'FDIC BankFind Suite API — Locations. 1 operations. Lead operation: Search FDIC-insured branch and office locations.
    Self-contained Naftiko capability covering one Federal Deposit Insurance Corporation business surface.'
  tags:
  - Federal Deposit Insurance Corporation
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FEDERAL_DEPOSIT_INSURANCE_CORPORATION_API_KEY: FEDERAL_DEPOSIT_INSURANCE_CORPORATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: bankfind-locations
    baseUri: https://banks.data.fdic.gov/api
    description: FDIC BankFind Suite API — Locations business capability. Self-contained, no shared references.
    resources:
    - name: locations
      path: /locations
      operations:
      - name: listlocations
        method: GET
        description: Search FDIC-insured branch and office locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bankfind-locations-rest
    port: 8080
    description: REST adapter for FDIC BankFind Suite API — Locations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/locations
      name: locations
      description: REST surface for locations.
      operations:
      - method: GET
        name: listlocations
        description: Search FDIC-insured branch and office locations
        call: bankfind-locations.listlocations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bankfind-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for FDIC BankFind Suite API — Locations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-fdic-insured-branch-and
      description: Search FDIC-insured branch and office locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bankfind-locations.listlocations
      outputParameters:
      - type: object
        mapping: $.
