aid: federal-deposit-insurance-corporation
name: Federal Deposit Insurance Corporation
description: >-
  The Federal Deposit Insurance Corporation (FDIC) is an independent agency of
  the United States government that provides deposit insurance to depositors in
  US commercial banks and savings institutions. The FDIC also supervises and
  examines banks for safety and soundness, promotes consumer protection, and
  publishes the BankFind Suite API for accessing data on FDIC-insured
  institutions.
