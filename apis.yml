    name: FDIC BankFind Suite API
    description: >-
      The FDIC BankFind Suite API provides programmatic access to data about
      FDIC-insured banks and savings institutions, including institution
      profiles, branch locations, financial summaries, historical records,
      failures, deposits, and demographic data.
